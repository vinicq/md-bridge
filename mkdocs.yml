site_name: md-bridge
site_description: Self-hosted PDF and Markdown converter. Deterministic, heuristic, no external calls.
site_author: Vinicius Queiroz
site_url: https://vinicq.github.io/md-bridge/

repo_name: vinicq/md-bridge
repo_url: https://github.com/vinicq/md-bridge
edit_uri: edit/main/docs/

theme:
  name: material
  logo: brand/logo.png
  favicon: brand/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Heuristics: heuristics.md
  - FAQ: faq.md
  - Deploy:
    - Render (free tier): deployment/render.md
    - Fly.io and Railway: deployment-other.md
  - API reference: API.md
  - API recipes: api-recipes.md
  - Design system: design/index.md
  - Contributing: contributing.md
  - Security: security.md
  - Changelog: changelog.md

plugins:
  - search
  # Trilingual docs (#29). Suffix structure: a page translates by adding a
  # `<name>.<locale>.md` sibling (e.g. getting-started.pt.md); pages without a
  # translation fall back to English, so the site never 404s a language. The
  # header gets a language selector from the `name` fields below.
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
        - locale: es
          name: Español
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vinicq/md-bridge
      name: md-bridge on GitHub

copyright: Copyright &copy; 2026 Vinicius Queiroz · MIT License
