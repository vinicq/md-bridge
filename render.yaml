# Render Blueprint for md-bridge.
# https://render.com/docs/blueprint-spec
#
# Two web services using the public GHCR images (multi-arch). The
# frontend reads VITE_API_URL at build time, which Render does not
# rebuild from a blueprint env; set the value in the Render dashboard
# after the api service URL is generated.

services:
  - type: web
    name: md-bridge-api
    runtime: image
    image:
      url: ghcr.io/vinicq/md-bridge-api:latest
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: PORT
        value: "8000"

  - type: web
    name: md-bridge-web
    runtime: image
    image:
      url: ghcr.io/vinicq/md-bridge-web:latest
    healthCheckPath: /
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false  # set this in the Render dashboard to the api service URL
