[project]
name = "md-bridge-api"
version = "0.1.0"
description = "FastAPI backend wrapping the pdf-to-markdown and markdown-to-pdf skills"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "python-multipart>=0.0.20",
    "PyMuPDF>=1.24",
    "pypdf>=5.0",
    "markdown>=3.7",
    "playwright>=1.49",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "httpx>=0.27",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]

[tool.pytest.ini_options]
testpaths = ["tests/unit", "tests/integration"]
addopts = "-q"
asyncio_mode = "auto"
markers = [
    "unit: pure-function tests (no I/O, no HTTP)",
    "integration: TestClient-driven endpoint tests",
]
