server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Upload cap matches the API (500 MB to support batch jobs with large PDFs).
    client_max_body_size 501M;
    client_body_timeout  600s;

    # API requests proxied to the api container (compose service name).
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Large markdown responses (>10MB for big PDFs) overran the default
        # ~32KB buffers and spilled to a proxy_temp file on disk, adding I/O
        # latency and a warning per request. Raise the in-memory buffers to
        # ~1MB for the common case and disable the temp file entirely, so a
        # response that still overruns streams synchronously instead of hitting
        # disk. `proxy_buffering on` is the default, stated here so it is not
        # confused with the `proxy_request_buffering off` line above.
        proxy_buffering          on;
        proxy_buffer_size        16k;
        proxy_buffers            64 16k;
        proxy_busy_buffers_size  32k;
        proxy_max_temp_file_size 0;
    }

    # Long-lived caching for built assets (they carry content hashes).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown route resolves to index.html so React Router
    # can pick it up on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
