server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Increase the upload cap to match the API (50 MB).
    client_max_body_size 51M;

    # API requests proxied to the api container (compose service name).
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Long-lived caching for built assets (they carry content hashes).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown route resolves to index.html so React Router
    # can pick it up on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
