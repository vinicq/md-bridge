version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      api-python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps-api)"

  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web-npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps-web)"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      root-npm-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - tooling
    commit-message:
      prefix: "chore(deps-root)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      ci-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps-ci)"

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-api:
        patterns:
          - "*"
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-web:
        patterns:
          - "*"
    labels:
      - dependencies
      - docker
