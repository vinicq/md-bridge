name: Lighthouse CI

on:
  pull_request:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Check gzipped JavaScript budget
        run: |
          node <<'NODE'
          const { gzipSync } = require('node:zlib')
          const { readdirSync, readFileSync, statSync } = require('node:fs')
          const { join } = require('node:path')

          const maxBytes = 150 * 1024
          const root = 'apps/web/dist/assets'

          function walk(dir) {
            return readdirSync(dir).flatMap((entry) => {
              const path = join(dir, entry)
              return statSync(path).isDirectory() ? walk(path) : [path]
            })
          }

          const jsFiles = walk(root).filter((path) => path.endsWith('.js'))
          const total = jsFiles.reduce(
            (sum, path) => sum + gzipSync(readFileSync(path)).length,
            0,
          )

          console.log(`gzipped JS total: ${total} bytes`)

          if (total > maxBytes) {
            throw new Error(
              `gzipped JS budget exceeded: ${total} > ${maxBytes} bytes`,
            )
          }
          NODE

      - name: Start web preview
        run: |
          npm --prefix apps/web run preview -- --host 127.0.0.1 --port 4173 > /tmp/md-bridge-vite-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/md-bridge-vite-preview.log
          exit 1

      - name: Run Lighthouse budgets
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # v12
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/convert/pdf-to-md
            http://127.0.0.1:4173/convert/md-to-pdf
            http://127.0.0.1:4173/about
          configPath: ./.lighthouserc.json

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/

