name: OpenSSF Scorecard

# Runs the OSSF Scorecard checks weekly and on every push to main. The score
# (and per-check breakdown) shows up in the Security tab and is uploaded as
# a SARIF artifact so it appears alongside CodeQL findings. The badge link
# in the README points at https://scorecard.dev/.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"  # Mondays at 07:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact (debug)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: results.sarif
