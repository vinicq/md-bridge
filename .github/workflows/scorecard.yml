name: OpenSSF Scorecard

# Runs the OSSF Scorecard checks weekly and on every push to main. The score
# (and per-check breakdown) shows up in the Security tab and is uploaded as
# a SARIF artifact so it appears alongside CodeQL findings. The badge link
# in the README points at https://scorecard.dev/.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"  # Mondays at 07:00 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact (debug)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: results.sarif
