name: Publish Docker images

# Builds and publishes the API and Web Docker images to the GitHub Container
# Registry (ghcr.io) so users can run the app without building locally:
#
#   docker pull ghcr.io/vinicq/md-bridge-api:0.1.1
#   docker pull ghcr.io/vinicq/md-bridge-web:0.1.1
#
# Triggers:
#   - on every push to main:        tags = "main", "sha-<short>"
#   - on every release published:   tags = the semver (and major.minor + latest)

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manual rebuild?"
        required: false
        default: "manual rebuild"

permissions:
  contents: read

jobs:
  publish:
    name: Publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
            target: runtime
          - name: web
            dockerfile: apps/web/Dockerfile
            target: runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up QEMU for cross-arch builds
        # Needed so the amd64 runner can build the linux/arm64 image via
        # emulation. The Oracle Cloud Always Free deploy recipe + Apple
        # Silicon devs both need the arm64 manifest.
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  smoke:
    name: Smoke test ${{ matrix.image.name }} on ${{ matrix.platform }}
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
          - name: web
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
        with:
          platforms: arm64

      - name: Resolve image reference
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}:main" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull image for ${{ matrix.platform }}
        run: docker pull --platform ${{ matrix.platform }} ${{ steps.ref.outputs.tag }}

      - name: Probe API container
        if: matrix.image.name == 'api'
        run: |
          docker run --rm --platform ${{ matrix.platform }} ${{ steps.ref.outputs.tag }} \
            python -c "from app.main import create_app; create_app(); print('api ok on ${{ matrix.platform }}')"

      - name: Probe Web container
        if: matrix.image.name == 'web'
        run: |
          # Integrity: the Vite build stage produced index.html in the web root.
          docker run --rm --platform ${{ matrix.platform }} \
            --entrypoint sh ${{ steps.ref.outputs.tag }} \
            -c 'test -f /usr/share/nginx/html/index.html && echo "web image ok on ${{ matrix.platform }}"'
          # Config validity: `nginx -t` parses the bundled default.conf, which
          # contains `proxy_pass http://api:8000`. The `api` name must resolve at
          # parse time, so stub it with --add-host; `nginx -t` only parses, it
          # never connects. This is the only place CI validates nginx.conf.
          docker run --rm --platform ${{ matrix.platform }} \
            --add-host api:127.0.0.1 \
            --entrypoint nginx ${{ steps.ref.outputs.tag }} -t
