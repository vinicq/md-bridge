name: Publish Docker images

# Builds and publishes the API and Web Docker images to the GitHub Container
# Registry (ghcr.io) so users can run the app without building locally:
#
#   docker pull ghcr.io/vinicq/md-bridge-api:0.1.1
#   docker pull ghcr.io/vinicq/md-bridge-web:0.1.1
#
# Triggers:
#   - on every push to main:        tags = "main", "sha-<short>"
#   - on every release published:   tags = the semver (and major.minor + latest)

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manual rebuild?"
        required: false
        default: "manual rebuild"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
            target: runtime
          - name: web
            dockerfile: apps/web/Dockerfile
            target: runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU for cross-arch builds
        # Needed so the amd64 runner can build the linux/arm64 image via
        # emulation. The Oracle Cloud Always Free deploy recipe + Apple
        # Silicon devs both need the arm64 manifest.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max

  smoke:
    name: Smoke test ${{ matrix.image.name }} on ${{ matrix.platform }}
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
          - name: web
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Resolve image reference
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}:main" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull image for ${{ matrix.platform }}
        run: docker pull --platform ${{ matrix.platform }} ${{ steps.ref.outputs.tag }}

      - name: Probe API container
        if: matrix.image.name == 'api'
        run: |
          docker run --rm --platform ${{ matrix.platform }} ${{ steps.ref.outputs.tag }} \
            python -c "from app.main import create_app; create_app(); print('api ok on ${{ matrix.platform }}')"

      - name: Probe Web container
        # `nginx -t` would parse the bundled default.conf which contains
        # `proxy_pass http://api:8000`; in an isolated container the `api`
        # hostname does not resolve and the parse fails. Instead, assert
        # that the Vite build stage produced index.html and copied it to
        # the nginx web root. That is the integrity check we actually
        # care about; nginx config validity is covered end-to-end by the
        # main CI job that boots the compose stack.
        if: matrix.image.name == 'web'
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            --entrypoint sh ${{ steps.ref.outputs.tag }} \
            -c 'test -f /usr/share/nginx/html/index.html && echo "web image ok on ${{ matrix.platform }}"'
