name: Publish Docker images

# Builds and publishes the API and Web Docker images to the GitHub Container
# Registry (ghcr.io) so users can run the app without building locally:
#
#   docker pull ghcr.io/vinicq/md-bridge-api:0.1.1
#   docker pull ghcr.io/vinicq/md-bridge-web:0.1.1
#
# Triggers:
#   - on every push to main:        tags = "main", "sha-<short>"
#   - on every release published:   tags = the semver (and major.minor + latest)

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manual rebuild?"
        required: false
        default: "manual rebuild"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
            target: runtime
          - name: web
            dockerfile: apps/web/Dockerfile
            target: runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/md-bridge-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
