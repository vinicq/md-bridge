name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Lint backend (ruff)
        run: python -m ruff check apps/api tests packages --config apps/api/pyproject.toml

      - name: Install Chromium for Playwright
        run: python -m playwright install chromium --with-deps

      - name: Run backend unit tests
        run: python -m pytest apps/api/tests

      - name: Run root-level integration tests
        run: python -m pytest tests

  web:
    name: Web (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Lint web
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Run web tests
        working-directory: apps/web
        run: npm run test

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Install Chromium for the backend
        run: python -m playwright install chromium --with-deps

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Install Chromium for the web tests
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: Run Playwright end-to-end tests
        working-directory: apps/web
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
