name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev,ocr]"

      - name: Install Tesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-por tesseract-ocr-spa

      - name: Lint backend (ruff)
        run: python -m ruff check apps/api tests packages --config apps/api/pyproject.toml

      - name: Scan test honesty (falsegreen)
        # Detects false-positive ("rotten green") Python tests. Exit 20 means a
        # HIGH-confidence finding and fails the job; exit 10 (LOW only) and 0
        # (clean) pass. LOW findings print here and in the job summary for
        # visibility but never block: posting them to code scanning turned them
        # into PR review threads that the "require conversation resolution" rule
        # treated as blockers, which is exactly the friction this gate avoids.
        # This is a static Python layer and does NOT replace the E2E honesty
        # gates (the Playwright suite reads the real converted artifact) nor
        # cover the Vitest tests in apps/web.
        run: |
          set +e
          python -m falsegreen apps/api/tests tests | tee falsegreen.txt
          code=$?
          echo "falsegreen exit: $code"
          {
            echo "### falsegreen (test honesty)"
            echo '```'
            tail -n 2 falsegreen.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$code" -eq 20 ]; then
            echo "::error::falsegreen found HIGH-confidence false-positive test(s)"
            exit 1
          fi
          exit 0

      - name: Install Chromium for Playwright
        run: python -m playwright install chromium --with-deps

      - name: Run backend unit tests with coverage
        run: python -m pytest apps/api/tests --cov=apps/api/app --cov-report=xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: backend-pytest
          fail_ci_if_error: false

      - name: Run root-level integration tests
        run: python -m pytest tests

  web:
    name: Web (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Lint web
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Run web tests
        working-directory: apps/web
        run: npm run test

  e2e:
    name: End-to-end (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [backend, web]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Install Chromium for the backend
        run: python -m playwright install chromium --with-deps

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Install ${{ matrix.browser }} for the web tests
        working-directory: apps/web
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Playwright end-to-end tests (${{ matrix.browser }})
        working-directory: apps/web
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 14
