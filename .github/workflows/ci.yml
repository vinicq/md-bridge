name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev,ocr]"

      - name: Install Tesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-por

      - name: Lint backend (ruff)
        run: python -m ruff check apps/api tests packages --config apps/api/pyproject.toml

      - name: Install Chromium for Playwright
        run: python -m playwright install chromium --with-deps

      - name: Run backend unit tests with coverage
        run: python -m pytest apps/api/tests --cov=apps/api/app --cov-report=xml

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: backend-pytest
          fail_ci_if_error: false

      - name: Run root-level integration tests
        run: python -m pytest tests

  web:
    name: Web (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Lint web
        working-directory: apps/web
        run: npm run lint

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Run web tests
        working-directory: apps/web
        run: npm run test

  e2e:
    name: End-to-end (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: [backend, web]
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install -e ".[dev]"

      - name: Install Chromium for the backend
        run: python -m playwright install chromium --with-deps

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci || npm install

      - name: Install ${{ matrix.browser }} for the web tests
        working-directory: apps/web
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Run Playwright end-to-end tests (${{ matrix.browser }})
        working-directory: apps/web
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: playwright-report-${{ matrix.browser }}
          path: apps/web/playwright-report/
          retention-days: 14
