name: md-bridge

# Services without a `profiles:` key are part of the default profile and
# start with `docker compose up`. The `tests-api` and `tests-web` services
# only run when explicitly selected via `--profile test`.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    image: md-bridge-api:latest
    container_name: md-bridge-api
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
    image: md-bridge-web:latest
    container_name: md-bridge-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  # Optional edge proxy that mirrors the production same-origin topology
  # (Caddy in front: /api/* to the API, everything else to the web UI). Off
  # by default; the CI deploy-smoke job starts it with `--profile edge` and
  # smokes through it, so a handle_path-style prefix-strip regression in the
  # proxy config fails CI (the direct nginx path on 5173 would not catch it).
  caddy:
    profiles: [edge]
    image: caddy:2-alpine
    container_name: md-bridge-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./deployment/oracle-cloud/Caddyfile.ci:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  # Test runner for the backend pytest suite. Starts on demand:
  #   docker compose --profile test run --rm tests-api
  tests-api:
    profiles: [test]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: test
    image: md-bridge-tests-api:latest
    container_name: md-bridge-tests-api
    environment:
      PYTHONUNBUFFERED: "1"

  # Test runner for the frontend vitest suite (unit + integration). Playwright
  # end-to-end tests are out of scope here; they live in CI and in
  # `npm run test:e2e` locally.
  tests-web:
    profiles: [test]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: test
    image: md-bridge-tests-web:latest
    container_name: md-bridge-tests-web
